name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid tag '$tag'. Expected format: vX.Y.Z"
          }

          $version = $tag.Substring(1)

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, pinned 2026-06-09

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Validate versions against tag
        shell: pwsh
        run: |
          $tag = "${{ steps.release_tag.outputs.version }}"

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version

          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $cargoPackage = $metadata.packages | Where-Object { $_.name -eq "accshift-gui" } | Select-Object -First 1
          if (-not $cargoPackage) {
            throw "Could not resolve accshift-gui version from cargo metadata"
          }
          $cargoVersion = $cargoPackage.version

          if ($packageVersion -ne $tag -or $tauriVersion -ne $tag -or $cargoVersion -ne $tag) {
            throw "Version mismatch. tag=$tag package.json=$packageVersion tauri.conf.json=$tauriVersion Cargo.toml=$cargoVersion"
          }

      - name: Validate updater signing key secret
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY. Auto-update artifacts cannot be signed."
          }

      - name: Validate telemetry endpoint
        shell: pwsh
        env:
          ACCSHIFT_TELEMETRY_URL: ${{ vars.ACCSHIFT_TELEMETRY_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ACCSHIFT_TELEMETRY_URL)) {
            throw "Missing GitHub variable ACCSHIFT_TELEMETRY_URL. Official builds must not use the inert fallback."
          }
          $uri = $null
          if (-not [Uri]::TryCreate($env:ACCSHIFT_TELEMETRY_URL, [UriKind]::Absolute, [ref]$uri) -or
              $uri.Scheme -ne "https" -or
              [string]::IsNullOrWhiteSpace($uri.Host) -or
              -not [string]::IsNullOrEmpty($uri.UserInfo) -or
              -not [string]::IsNullOrEmpty($uri.Query) -or
              -not [string]::IsNullOrEmpty($uri.Fragment) -or
              $env:ACCSHIFT_TELEMETRY_URL -ne $env:ACCSHIFT_TELEMETRY_URL.Trim() -or
              $env:ACCSHIFT_TELEMETRY_URL.EndsWith('/')) {
            throw "ACCSHIFT_TELEMETRY_URL must be an HTTPS base URL without credentials, query, fragment, or trailing slash."
          }

      - name: Build Tauri bundles
        env:
          ACCSHIFT_TELEMETRY_URL: ${{ vars.ACCSHIFT_TELEMETRY_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: vp exec tauri build

      - name: Stage standalone CLI artifact
        shell: pwsh
        run: |
          $version = "${{ steps.release_tag.outputs.version }}"
          $cli = "target/release/accshift.exe"
          if (-not (Test-Path $cli)) {
            throw "CLI binary not found at $cli"
          }
          Copy-Item $cli "target/release/bundle/accshift-cli_${version}_x64.exe"

      - name: Generate release changelog
        shell: pwsh
        run: |
          $tag = "${{ steps.release_tag.outputs.tag }}"
          $currentVersion = [version]($tag.Substring(1))
          $previousRelease = git tag --list "v*" |
            ForEach-Object {
              if ($_ -match '^v\d+\.\d+\.\d+$') {
                $candidateVersion = [version]($_.Substring(1))
                if ($candidateVersion -lt $currentVersion) {
                  [PSCustomObject]@{ Tag = $_; Version = $candidateVersion }
                }
              }
            } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          $prevTag = if ($null -eq $previousRelease) { "" } else { $previousRelease.Tag }
          $baseCommit = ""

          if (-not [string]::IsNullOrWhiteSpace($prevTag)) {
            $previousTree = (git rev-parse "$prevTag^{tree}").Trim()
            foreach ($commit in git rev-list "$tag^") {
              if ((git show -s --format="%T" $commit).Trim() -eq $previousTree) {
                $baseCommit = $commit
                break
              }
            }
            if ([string]::IsNullOrWhiteSpace($baseCommit)) {
              throw "Could not find the $prevTag release tree in the current history. Refusing to generate an all-history changelog."
            }
          }

          $range = if ([string]::IsNullOrWhiteSpace($baseCommit)) { $tag } else { "$baseCommit..$tag" }

          # PowerShell returns command output as a string array; join once, then split by separators.
          $recordSeparator = [char]0x1e
          $fieldSeparator = [char]0x1f
          $raw = (git log --reverse --pretty=format:"%s%x1f%b%x1e" $range) -join "`n"
          $records = $raw -split $recordSeparator | Where-Object { -not [string]::IsNullOrWhiteSpace($_.Trim()) }

          function Normalize-Subject {
            param([string]$Subject)

            $normalized = $Subject.Trim()
            $normalized = $normalized -replace '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!?:\s*', ''
            if ([string]::IsNullOrWhiteSpace($normalized)) {
              return $Subject.Trim()
            }

            return $normalized
          }

          function Get-SectionName {
            param(
              [string]$Subject,
              [string]$NormalizedSubject
            )

            $lowerSubject = $Subject.ToLowerInvariant()
            $lowerNormalized = $NormalizedSubject.ToLowerInvariant()

            if ($lowerSubject -match '^(fix|hotfix)(\([^)]+\))?!?:' -or $lowerNormalized -match '^(fix|hotfix|bugfix)\b') {
              return "Fixes"
            }

            return "Changes"
          }

          $grouped = @{
            "Changes" = New-Object System.Collections.Generic.List[object]
            "Fixes" = New-Object System.Collections.Generic.List[object]
          }

          foreach ($record in $records) {
            $parts = $record.Split($fieldSeparator, 2)
            if ($parts.Count -lt 1) {
              continue
            }

            $subject = $parts[0].Trim()
            if ([string]::IsNullOrWhiteSpace($subject)) {
              continue
            }

            $body = if ($parts.Count -ge 2) { $parts[1] } else { "" }
            $details = @()
            if (-not [string]::IsNullOrWhiteSpace($body)) {
              $details = $body -split "\r?\n" |
                ForEach-Object { $_.Trim() } |
                Where-Object { $_ -like "- *" } |
                ForEach-Object { $_.Substring(2).Trim() }
            }

            $entry = [PSCustomObject]@{
              Subject = Normalize-Subject -Subject $subject
              Details = $details
            }

            $section = Get-SectionName -Subject $subject -NormalizedSubject $entry.Subject
            $grouped[$section].Add($entry)
          }

          $notes = New-Object System.Collections.Generic.List[string]

          foreach ($section in @("Changes", "Fixes")) {
            if ($grouped[$section].Count -eq 0) {
              continue
            }

            $notes.Add("## $section")
            $notes.Add("")

            foreach ($entry in $grouped[$section]) {
              if ($entry.Details.Count -gt 0) {
                $notes.Add("- $($entry.Subject): $($entry.Details -join '; ')")
              } else {
                $notes.Add("- $($entry.Subject)")
              }
            }

            $notes.Add("")
          }

          if ($notes.Count -eq 0) {
            $notes.Add("## Changes")
            $notes.Add("")
            $notes.Add("- No changelog entries found.")
          }

          $notesText = ($notes -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($notesText)) {
            $notesText = "## Changes`n`n- No changelog entries found."
          }

          Set-Content -Path RELEASE_NOTES.md -Value $notesText -Encoding utf8
          Get-Content RELEASE_NOTES.md

      - name: Generate updater manifest
        shell: pwsh
        run: |
          $tag = "${{ steps.release_tag.outputs.tag }}"
          $version = "${{ steps.release_tag.outputs.version }}"
          $repo = "${{ github.repository }}"
          $bundleDir = "target/release/bundle"

          $primaryAsset = Get-ChildItem "$bundleDir/nsis/*.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $primaryAsset) {
            $primaryAsset = Get-ChildItem "$bundleDir/msi/*.msi" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $primaryAsset) {
            throw "Could not find a release installer asset (.exe or .msi) to reference in latest.json"
          }

          $sigPath = "$($primaryAsset.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            throw "Missing updater signature file for $($primaryAsset.Name): $sigPath"
          }

          $signature = (Get-Content $sigPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($signature)) {
            throw "Signature file is empty: $sigPath"
          }

          $notes = (Get-Content RELEASE_NOTES.md -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "No changelog entries found."
          }

          $assetUrl = "https://github.com/$repo/releases/download/$tag/$($primaryAsset.Name)"

          $manifest = @{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $assetUrl
              }
            }
          }

          $manifestPath = Join-Path $bundleDir "latest.json"
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path $manifestPath -Encoding utf8
          Get-Content $manifestPath

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-windows
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/accshift-cli_*.exe
            target/release/bundle/latest.json

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-notes
          if-no-files-found: error
          path: RELEASE_NOTES.md

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve release tag
        id: release_tag
        run: |
          tag="$GITHUB_REF_NAME"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag '$tag'. Expected format: vX.Y.Z" >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, pinned 2026-06-09

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # Version/tag consistency and the telemetry URL format are validated once
      # in build-windows; the release job depends on all build jobs, so a
      # failure there still blocks the release.
      - name: Build Tauri bundles
        env:
          ACCSHIFT_TELEMETRY_URL: ${{ vars.ACCSHIFT_TELEMETRY_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: vp exec tauri build

      - name: Stage standalone CLI artifact
        run: |
          version="${{ steps.release_tag.outputs.version }}"
          cli="target/release/accshift"
          if [ ! -f "$cli" ]; then
            echo "CLI binary not found at $cli" >&2
            exit 1
          fi
          cp "$cli" "target/release/bundle/accshift-cli_${version}_linux_x86_64"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-linux
          if-no-files-found: error
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/accshift-cli_*_linux_*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve release tag
        id: release_tag
        run: |
          tag="$GITHUB_REF_NAME"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag '$tag'. Expected format: vX.Y.Z" >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, pinned 2026-06-09

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # Bundles are unsigned and not notarized (no Apple Developer identity
      # yet). Gatekeeper will quarantine the download; the install
      # instructions in the release notes cover removing the quarantine flag.
      - name: Build Tauri bundles
        env:
          ACCSHIFT_TELEMETRY_URL: ${{ vars.ACCSHIFT_TELEMETRY_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: vp exec tauri build

      - name: Stage standalone CLI artifact
        run: |
          version="${{ steps.release_tag.outputs.version }}"
          cli="target/release/accshift"
          if [ ! -f "$cli" ]; then
            echo "CLI binary not found at $cli" >&2
            exit 1
          fi
          cp "$cli" "target/release/bundle/accshift-cli_${version}_macos_aarch64"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-macos
          if-no-files-found: error
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/accshift-cli_*_macos_*

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble release files
        run: |
          mkdir -p dist
          # Artifacts keep their bundle subdirectories (nsis/, deb/, dmg/...);
          # flatten them so the release attaches plain files.
          find artifacts -type f ! -name RELEASE_NOTES.md -exec cp {} dist/ \;
          ls -la dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          rm -f SHA256SUMS.txt
          files=$(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort)
          if [ -z "$files" ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          printf '%s\n' "$files" | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Finalize release notes
        run: |
          cp artifacts/RELEASE_NOTES.md RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md <<'EOF'

          ## Install notes

          - **Windows**: run the `.exe` (NSIS) or `.msi` installer.
          - **Linux**: install the `.deb` / `.rpm`, or `chmod +x` the `.AppImage` and run it.
          - **macOS** (Apple Silicon): the app is not yet notarized. After copying Accshift.app to Applications, clear the quarantine flag once: `xattr -cr /Applications/Accshift.app`.
          EOF
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/*
