name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Vite+ check
        run: vp check

      - name: Svelte check
        run: vp run check:frontend

      - name: Frontend tests
        run: vp test

      - name: Build frontend
        run: vp build

      - name: Cargo fmt
        run: vp run fmt:check

      - name: Cargo clippy
        run: vp run clippy

      - name: Cargo check
        run: vp run check:rust

      - name: Rust tests
        run: vp run test:rust

      - name: Cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --quiet
          cargo audit --file src-tauri/Cargo.lock
