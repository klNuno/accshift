name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Vite+ check
        run: vp check

      - name: Svelte check
        run: vp run check:frontend

      - name: Run tests
        run: vp test

      - name: Build frontend
        run: vp build

      - name: Cargo fmt
        run: vp run fmt:check

      - name: Cargo clippy
        run: vp run clippy

      - name: Cargo check
        run: vp run check:rust
